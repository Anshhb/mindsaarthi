name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: mindsaarthi_app
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: mindsaarthi_app
        run: flutter build web --release --base-href /mindsaarthi/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mindsaarthi_app/build/web

  deploy:
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4